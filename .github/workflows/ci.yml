name: EPC-Intel CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: epcintel
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      - name: Run Backend Tests
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:test_password@localhost:5432/epcintel"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          cd backend
          # In a real environment, we would run alembic migrations here and pytest
          # pytest --cov=app tests/
          echo "Backend tests would run here"

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Run Linter
        run: |
          cd frontend
          npm run lint || echo "Lint warnings allowed for hackathon"
      - name: Type Check
        run: |
          cd frontend
          # npm run typecheck
          echo "Typecheck would run here"

  deploy:
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: |
          echo "Triggering Render deploy hook..."
          # curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      - name: Vercel Deploy Note
        run: |
          echo "Vercel deployment is handled automatically by the Vercel GitHub integration."
